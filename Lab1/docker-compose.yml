version: "3.9"

services:
  backend:
    build: 
        context: .
        dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    networks:
      - app-net

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge